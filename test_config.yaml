# 3D UNet — inference config
# Loads the best checkpoint and runs patch-based prediction on the test set.
# Predictions are saved as HDF5 files (dataset "predictions") in output_dir.
# Use postprocess_predictions.py to convert them back to .npy / .nii.gz.

model_path: /projects/CTdata/3dunet_checkpoints/best_checkpoint.pytorch

model:
  name: UNet3D
  in_channels: 1
  out_channels: 1
  layer_order: gcr
  f_maps: [16, 32, 64, 128, 256]
  num_groups: 8
  is_segmentation: false

predictor:
  name: StandardPredictor

loaders:
  dataset: StandardHDF5Dataset
  batch_size: 1
  num_workers: 4
  raw_internal_path: raw
  output_dir: /projects/CTdata/3dunet_predictions
  global_normalization: true

  test:
    file_paths:
      - /projects/CTdata/h5_3dunet/test

    slice_builder:
      name: SliceBuilder
      patch_shape: [64, 128, 128]
      stride_shape: [64, 128, 128]
      halo_shape:   [ 8,  16,  16]  # mirror padding to reduce edge artifacts

    transformer:
      raw:
        - name: Normalize
        - name: ToTensor
          expand_dims: true
